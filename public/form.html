<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cadastrar Produto</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:20px}
    label{display:block;margin-top:10px}
    input,textarea,select{width:100%;padding:8px;margin-top:4px}
    button{margin-top:12px;padding:8px 12px}
  </style>
</head>
<body>
  <h1>Cadastrar Produto</h1>
  <form id="productForm">
    <label>Título<input name="title" required /></label>
    <label>Categoria<input name="category" /></label>
    <label>Descrição<textarea name="description"></textarea></label>
    <label>Preço<input name="price" type="number" step="0.01" /></label>
    <button type="submit">Cadastrar</button>
  </form>
  <p><a href="/">Voltar para lista</a></p>

  <script>
    const form = document.getElementById('productForm');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(form));
      data.price = data.price ? Number(data.price) : 0;
      const res = await fetch('/api/products', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      if (res.ok) {
        alert('Produto cadastrado com sucesso!');
        window.location.href = '/';
      } else {
        const err = await res.json();
        alert('Erro: ' + (err.error || res.status));
      }
    });
  </script>
</body>
</html>
