<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cadastrar Produto</title>
  <style>
    :root {
      --bg-a: #f6f8fb;
      --bg-b: #eef2ff;
      --surface: #ffffff;
      --text: #182433;
      --muted: #5f6f82;
      --primary: #0f6fff;
      --primary-dark: #0a56c9;
      --border: #d9e2ef;
      --shadow: 0 14px 30px rgba(16, 34, 68, 0.08);
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 0%, #dde8ff 0%, transparent 32%),
        radial-gradient(circle at 100% 20%, #d7f4ff 0%, transparent 30%),
        linear-gradient(160deg, var(--bg-a), var(--bg-b));
      min-height: 100vh;
      padding: 28px 18px;
    }

    .page {
      max-width: 680px;
      margin: 0 auto;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      animation: fadeIn 0.26s ease;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.45rem, 2.1vw, 1.9rem);
    }

    .subtitle {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: 600;
      color: #1e2d40;
    }

    input,
    textarea,
    select {
      width: 100%;
      margin-top: 6px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      outline: none;
      font: inherit;
      background: #fff;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: #8eb7ff;
      box-shadow: 0 0 0 4px rgba(15, 111, 255, 0.12);
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .actions {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button,
    .link {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.16s ease, background 0.16s ease;
    }

    button {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 10px 20px rgba(15, 111, 255, 0.22);
    }

    button:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .link {
      background: #eff3f9;
      color: #2e4057;
    }

    .link:hover {
      background: #e4ecf7;
      transform: translateY(-1px);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <h1>Cadastrar Produto</h1>
      <p class="subtitle">Preencha os dados abaixo para adicionar um novo item.</p>

      <form id="productForm">
        <label>Titulo<input name="title" required /></label>
        <label>Categoria<input name="category" /></label>
        <label>Descricao<textarea name="description"></textarea></label>
        <label>Preco<input name="price" type="number" step="0.01" /></label>

        <div class="actions">
          <button type="submit">Cadastrar</button>
          <a href="./index.html" class="link">Voltar para lista</a>
        </div>
      </form>
    </section>
  </main>

  <script>
    function getApiBase() {
      return window.location.port === '3000' ? '' : 'http://localhost:3000';
    }

    const form = document.getElementById('productForm');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(form));
      data.price = data.price ? Number(data.price) : 0;

      try {
        const res = await fetch(`${getApiBase()}/api/products`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        if (!res.ok) {
          let errorMessage = `Erro ao cadastrar (status ${res.status})`;
          try {
            const err = await res.json();
            if (err && err.error) errorMessage = err.error;
          } catch (_) {}
          throw new Error(errorMessage);
        }

        alert('Produto cadastrado com sucesso!');
        window.location.href = window.location.port === '3000' ? '/' : './index.html';
      } catch (error) {
        alert(error.message || 'Erro ao cadastrar produto. Verifique se o backend esta rodando em http://localhost:3000.');
      }
    });
  </script>
</body>
</html>
